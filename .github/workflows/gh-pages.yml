name: GitHub Pages

on:
  push:
    branches:
    - 'master'
  pull_request:
    branches:
      - 'master'

jobs:
  docs:
    name: "Deploy"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Dependencies
        run: |
          sudo apt update
          sudo apt install -y xsltproc doxygen doxygen-doc texlive ghostscript graphviz python3-wheel python3-setuptools
          pip install --break-system-packages --user mkdocs-autorefs zensical
          echo "${HOME}/.local/bin" >> ${GITHUB_PATH}

      - name: Configure Git
        run: |
          git config --global push.default upstream
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Get YARP XSL interpreter
        run: |
          cd ${GITHUB_WORKSPACE}
          git clone --depth 1 --branch master https://github.com/robotology/yarp.git
          echo "YARP_SOURCE_DIR=${GITHUB_WORKSPACE}/yarp" >> ${GITHUB_ENV}

      - name: Build Doxygen
        run: |
          cd doc/doxygen
          ./doc-compile.sh

      - name: Build Zensical
        run: |
          zensical build --clean

      - name: Stage Doxygen into site
        run: |
          mkdir -p site/doc/doxygen
          cp -a doc/doxygen/doc site/doc/doxygen/

      - name: Create and prepare gh-pages anew
        run: |
          git checkout --orphan gh-pages
          rm -R `ls -A | grep -v -E "^(.git|site)$"`
          mv site/* ./

      - name: Commit and push
        if: github.event_name == 'push'
        run: |
          git add .
          git commit -m "publish site"
          git push --force --set-upstream origin gh-pages       
